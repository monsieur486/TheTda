<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6" xmlns:th="http://www.thymeleaf.org">
<div th:fragment="menu">
    <nav class="navbar bg-primary fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <img src="/img/atout21.png" style="display: inline-block; width: 20px; height: 40px;">
                <span style="display: inline-block;">TDA</span>
            </a>
            <a class="navbar-brand"
               href="/admin/reunion"
               sec:authorize="isAuthenticated()" th:if="${status == 1}">📅 Réunion</a>
            <a class="navbar-brand"
               href="/admin/partie"
               sec:authorize="isAuthenticated()" th:if="${status == 2}">🎲 Partie</a>
            <button type="button"
                    class="btn btn-warning"
                    data-bs-toggle="modal"
                    data-bs-target="#cagnotteModal"
                    sec:authorize="isAuthenticated()" th:if="${status == 2}">
                💶 Cagnotte
            </button>
            <button type="button"
                    class="btn btn-danger"
                    data-bs-toggle="modal"
                    data-bs-target="#razModal"
                    sec:authorize="isAuthenticated()" th:if="${status == 3}">
                🗑️ RAZ
            </button>
            <button aria-controls="offcanvasNavbar" aria-label="Toggle navigation" class="navbar-toggler"
                    data-bs-target="#offcanvasNavbar"
                    data-bs-toggle="offcanvas" type="button">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div aria-labelledby="offcanvasNavbarLabel" class="offcanvas offcanvas-end" id="offcanvasNavbar"
                 tabindex="-1">
                <div class="offcanvas-header">
                    <button aria-label="Close" class="btn-close" data-bs-dismiss="offcanvas" type="button"></button>
                </div>
                <div class="offcanvas-body">
                    <form method="post"
                          th:action="@{/login}"
                          sec:authorize="isAnonymous()"
                          class="d-flex flex-column gap-3">

                        <div>
                            <label class="form-label">👤 Utilisateur</label>
                            <input class="form-control"
                                   name="username"
                                   type="text"
                                   placeholder="Utilisateur"/>
                        </div>

                        <div>
                            <label class="form-label">🔒 Mot de passe</label>
                            <input class="form-control"
                                   name="password"
                                   type="password"
                                   placeholder="Mot de passe"/>
                        </div>

                        <button class="btn btn-primary" type="submit">
                            Se connecter
                        </button>

                        <div class="text-danger" th:if="${param.error}">
                            Identifiants invalides.
                        </div>
                    </form>

                    <form method="post"
                          th:action="@{/logout}"
                          sec:authorize="isAuthenticated()"
                          class="mt-3">
                        <button class="btn btn-warning w-100" type="submit">
                            Déconnexion
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </nav>
    <!-- Modal de confirmation -->
    <div class="modal fade" id="cagnotteModal" tabindex="-1" aria-labelledby="cagnotteModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="cagnotteModalLabel">Cagnotte</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fermer"></button>
                </div>
                <div class="modal-body">
                    Confirmer le passage à la cagnotte ?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>

                    <form th:action="@{/admin/reunion/cagnotte}" method="post" class="m-0">
                        <button type="submit" class="btn btn-primary">OK</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <!-- Modal de confirmation RAZ -->
    <div class="modal fade" id="razModal" tabindex="-1" aria-labelledby="razModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="razModalLabel">RAZ réunion</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fermer"></button>
                </div>
                <div class="modal-body">
                    Confirmer la remise à zéro de la réunion ?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>

                    <form th:action="@{/admin/reunion/raz}" method="post" class="m-0">
                        <button type="submit" class="btn btn-primary">OK</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</html>
