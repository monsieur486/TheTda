<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6" xmlns:th="http://www.thymeleaf.org">
<div th:fragment="menu">
    <nav class="navbar navbar-dark bg-primary fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <img src="/img/atout21.png" style="display: inline-block; width: 20px; height: 40px;">
                <span style="display: inline-block;">TDA</span>
            </a>
            <a class="navbar-brand"
               href="/admin/reunion"
               sec:authorize="isAuthenticated()" th:if="${status == 1}">📅 Réunion</a>
            <a class="navbar-brand"
               href="/admin/partie"
               sec:authorize="isAuthenticated()" th:if="${status == 2}">🎲 Partie</a>
            <button class="btn btn-warning"
                    data-bs-target="#cagnotteModal"
                    data-bs-toggle="modal"
                    sec:authorize="isAuthenticated()"
                    th:if="${status == 2}" type="button">
                💶 Cagnotte
            </button>
            <button class="btn btn-warning"
                    data-bs-target="#razModal"
                    data-bs-toggle="modal"
                    sec:authorize="isAuthenticated()"
                    th:if="${status == 3}" type="button">
                ♻️️ RAZ
            </button>
            <button aria-controls="offcanvasNavbar" aria-label="Toggle navigation" class="navbar-toggler"
                    data-bs-target="#offcanvasNavbar"
                    data-bs-toggle="offcanvas" type="button">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div aria-labelledby="offcanvasNavbarLabel" class="offcanvas offcanvas-end" id="offcanvasNavbar"
                 tabindex="-1">
                <div class="offcanvas-header">
                    <button aria-label="Close" class="btn-close" data-bs-dismiss="offcanvas" type="button"></button>
                </div>
                <div class="offcanvas-body">
                    <form class="d-flex flex-column gap-3"
                          method="post"
                          sec:authorize="isAnonymous()"
                          th:action="@{/login}">

                        <div>
                            <label class="form-label">👤 Utilisateur</label>
                            <input class="form-control"
                                   name="username"
                                   placeholder="Utilisateur"
                                   type="text"/>
                        </div>

                        <div>
                            <label class="form-label">🔒 Mot de passe</label>
                            <input class="form-control"
                                   name="password"
                                   placeholder="Mot de passe"
                                   type="password"/>
                        </div>

                        <button class="btn btn-primary" type="submit">
                            Se connecter
                        </button>

                        <div class="text-danger" th:if="${param.error}">
                            Identifiants invalides.
                        </div>
                    </form>

                    <form class="mt-3"
                          method="post"
                          sec:authorize="isAuthenticated()"
                          th:action="@{/logout}">
                        <button class="btn btn-warning w-100" type="submit">
                            Déconnexion
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </nav>
    <!-- Modal de confirmation -->
    <div aria-hidden="true" aria-labelledby="cagnotteModalLabel" class="modal fade" id="cagnotteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="cagnotteModalLabel">Cagnotte</h5>
                    <button aria-label="Fermer" class="btn-close" data-bs-dismiss="modal" type="button"></button>
                </div>
                <div class="modal-body">
                    Confirmer le passage à la cagnotte ?
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal" type="button">Cancel</button>

                    <form class="m-0" method="post" th:action="@{/admin/reunion/cagnotte}">
                        <button class="btn btn-primary" type="submit">OK</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <!-- Modal de confirmation RAZ -->
    <div aria-hidden="true" aria-labelledby="razModalLabel" class="modal fade" id="razModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="razModalLabel">RAZ réunion</h5>
                    <button aria-label="Fermer" class="btn-close" data-bs-dismiss="modal" type="button"></button>
                </div>
                <div class="modal-body">
                    Confirmer la remise à zéro de la réunion ?
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal" type="button">Cancel</button>

                    <form class="m-0" method="post" th:action="@{/admin/reunion/raz}">
                        <button class="btn btn-primary" type="submit">OK</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</html>
