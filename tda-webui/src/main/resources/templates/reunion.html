<!DOCTYPE HTML>
<html lang="fr"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>TDA</title>
    <div th:replace="~{fragments/header :: header-css}"></div>
</head>
<body>
<div th:replace="~{fragments/menu :: menu}"></div>
<div class="container-fluid">
    <div id="top-offset"></div>
    <div class="mt-3" th:if="${errorMessage}">
        <div class="alert alert-danger" th:text="${errorMessage}"></div>
    </div>
    <div class="mt-3" th:if="${status == 1}">
        <form th:action="@{/admin/reunion}" method="post">
            <div class="mb-2">
                <strong>Sélectionne les joueurs (4 à 6) :</strong>
            </div>

            <div th:if="${amis == null or #lists.isEmpty(amis)}" class="alert alert-warning">
                Aucun ami disponible.
            </div>

            <div th:if="${amis != null and !#lists.isEmpty(amis)}">
                <div class="form-check" th:each="a : ${amis}">
                    <input class="form-check-input"
                           type="checkbox"
                           name="amiIds"
                           th:id="${'ami_' + a.id}"
                           th:value="${a.id}"/>
                    <label class="form-check-label"
                           th:for="${'ami_' + a.id}"
                           th:text="${a.nom}">
                        Ami
                    </label>
                </div>

                <div class="mt-3">
                    <button class="btn btn-primary" type="submit">Créer la réunion</button>
                </div>
            </div>
        </form>
    </div>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
